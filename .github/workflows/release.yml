name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  C3_VERSION: v0.7.10

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install C3 Compiler
        run: |
          mkdir -p /opt/c3
          curl -L "https://github.com/c3lang/c3c/releases/download/${{ env.C3_VERSION }}/c3-linux.tar.gz" | tar xz -C /opt/c3 --strip-components=1
          echo "/opt/c3" >> "$GITHUB_PATH"

      - name: Run Tests
        run: c3c test lsp

      - name: Build Linux x86_64
        run: |
          c3c build lsp -O2
          cd build && zip ../c3-lsp-linux-x86_64.zip lsp

      - name: Cache MSVC SDK
        id: cache-msvc
        uses: actions/cache@v4
        with:
          path: ~/.cache/c3/msvc_sdk
          key: msvc-sdk

      - name: Fetch MSVC SDK
        if: steps.cache-msvc.outputs.cache-hit != 'true'
        run: c3c fetch-msvc --accept-license

      - name: Build Windows x86_64
        run: |
          c3c build lsp --target windows-x64 -O2 --build-dir build-windows --output-dir build-windows
          cd build-windows && zip ../c3-lsp-windows-x86_64.zip lsp.exe

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-lsp-linux-x86_64
          path: c3-lsp-linux-x86_64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-lsp-windows-x86_64
          path: c3-lsp-windows-x86_64.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install C3 Compiler
        run: |
          curl -L -o /tmp/c3-macos.zip "https://github.com/c3lang/c3c/releases/download/${{ env.C3_VERSION }}/c3-macos.zip"
          unzip -o /tmp/c3-macos.zip -d "$HOME"
          echo "$HOME/c3" >> "$GITHUB_PATH"

      - name: Build macOS aarch64
        run: |
          c3c build lsp -O2
          cd build && zip ../c3-lsp-macos-aarch64.zip lsp

      - name: Build macOS x86_64
        run: |
          c3c build lsp --target macos-x64 -O2 --build-dir build-macos-x64 --output-dir build-macos-x64
          cd build-macos-x64 && zip ../c3-lsp-macos-x86_64.zip lsp

      - name: Upload macOS aarch64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-lsp-macos-aarch64
          path: c3-lsp-macos-aarch64.zip

      - name: Upload macOS x86_64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-lsp-macos-x86_64
          path: c3-lsp-macos-x86_64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            c3-lsp-linux-x86_64/c3-lsp-linux-x86_64.zip
            c3-lsp-windows-x86_64/c3-lsp-windows-x86_64.zip
            c3-lsp-macos-aarch64/c3-lsp-macos-aarch64.zip
            c3-lsp-macos-x86_64/c3-lsp-macos-x86_64.zip
          generate_release_notes: true
